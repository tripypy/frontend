# .github/workflows/frontend-prod.yml
name: Frontend Production CI/CD

on:
  push:
    branches: ['develop'] # develop 에 커밋(=PR 머지) 되면 실행

jobs:
  deploy-prod:
    name: Build & Deploy Production
    runs-on: ubuntu-latest
    environment: Preview # 🔹 GitHub Environment 이름 (여기에 prod용 Vercel secrets)

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run vite build only (no type-check, no lint)
        run: npm run build-only

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # 1) prod 환경 정보 가져오기
      - name: Pull Vercel Environment (production)
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      # 2) Vercel 빌드
      - name: Vercel build (production)
        run: vercel build --token=$VERCEL_TOKEN

      # 3) prebuilt 결과를 prod로 배포
      - name: Deploy Production to Vercel
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
